syntax = "proto3";

package com.eip.ptp;

option java_multiple_files = true;
option java_package = "com.eip.ptp.grpc";

service OrderService {
    rpc createOrder (OrderRequest) returns (OrderResponse) {}
}

message OrderRequest {
    string order_id = 1;
    string product = 2;
    int32 quantity = 3;
}

message OrderResponse {
    string order_id = 1;
    string status = 2;
    string message = 3;
}